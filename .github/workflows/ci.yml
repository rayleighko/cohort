# Cohort CI — machine gate (Phase 0 B1)
# Local: .claude/hooks/pre-push.sh remains for fast feedback.
# Refs: docs/engineering/phase-0-closeout.md, dependency-upgrades.md
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CI: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: "[1/6] Brand mapping scan"
        run: |
          # Match legacy mascot "준 " only when not part of a Korean compound (e.g. skip "수준").
          LEGACY_REFS=$(grep -rn -E "(^|[^가-힣])준\s|(Joon[^a-z]|joon-mate|joon_chat|JoonAvatar|JoonChatBubble|JoonNarration|joon-prompt)" src/ 2>/dev/null | grep -v "// HISTORICAL" | grep -v "// LEGACY" || true)
          if [ -n "$LEGACY_REFS" ]; then
            echo "FAIL — Legacy brand references found in src/:"
            echo "$LEGACY_REFS" | head -10
            exit 1
          fi
          echo "PASS"

      - name: "[2/6] Option B compliance scan"
        run: |
          FORBIDDEN=$(grep -rn -E "(추천|권장|매수하세요|파세요|비중\s*[0-9]+%|지금\s*매수|timing입니다)" src/ \
            --exclude-dir=__tests__ --exclude='*.test.ts' --exclude='*.test.tsx' 2>/dev/null \
            | grep -v "src/app/privacy/" | grep -v "src/app/terms/" \
            | grep -v "src/lib/claude/safety-filter.ts" | grep -v "src/lib/claude/vesper-prompt.ts" \
            | grep -v "src/lib/aurora/aurora-prompt.ts" | grep -v "src/lib/aurora/chat-prompt.ts" \
            | grep -v "OPTION-B-ALLOWED" | grep -v "// EXAMPLE" | grep -v "// FORBIDDEN" || true)
          if [ -n "$FORBIDDEN" ]; then
            echo "FAIL — Option B forbidden phrases:"
            echo "$FORBIDDEN" | head -10
            exit 1
          fi
          echo "PASS"

      - name: "[3/6] TypeScript"
        run: pnpm typecheck

      - name: "[4/6] ESLint"
        run: pnpm lint

      - name: "[5/6] Vitest (excludes Task 5 Red — scoreGlRts)"
        run: pnpm test:ci

      - name: "[6/6] Production build"
        run: pnpm build
